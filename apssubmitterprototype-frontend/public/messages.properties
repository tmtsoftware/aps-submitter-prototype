# APS Procedure Event Messages
# Maps messageId keys (published in apsProcedureEvent) to natural language
# text displayed in the procedure log. Edit this file to change wording
# without modifying sequencer scripts.

# Sequencer lifecycle
msg.sequencer.online=Sequencer is online and ready
msg.sequencer.offline=Sequencer is offline
msg.sequencer.stopped=Sequencer has stopped
msg.sequencer.shutdown=Sequencer has shut down
msg.sequencer.error=Sequencer encountered an error

# Sequence lifecycle
msg.sequence.aborted=Sequence was aborted

# M1CS moves
msg.cmd-m1cs-moves.start=Commanding M1CS segment moves
msg.cmd-m1cs-moves.complete=M1CS segment moves complete

# Color step computation
msg.calc-colorstep.start=Calculating color step
msg.calc-colorstep.complete=Color step calculation complete

# TT offsets to actuators
msg.calc-tt-offsets-to-acts.start=Calculating tip/tilt offsets to actuators
msg.calc-tt-offsets-to-acts.complete=Tip/tilt offset calculation complete

# Actuator decomposition
msg.calc-decompose-acts.start=Decomposing actuator commands
msg.calc-decompose-acts.complete=Actuator decomposition complete

# Sequencer B handoff
msg.send-sequence-to-sequencerB.start=Sending sequence to Sequencer B
msg.send-sequence-to-sequencerB.complete=Sequencer B sequence completed

# Ask-user prompt (Sequencer B)
msg.ask-user.start=Warning prompt sent to user interface.  Waiting for operator input
msg.ask-user.prompt=Subimage maximums in non-linear range!
msg.ask-user.complete=Operator response received, continuing procedure
